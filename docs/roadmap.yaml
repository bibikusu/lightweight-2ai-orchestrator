  - id: P6C-pre
    name: queue execution engine responsibility canonicalization
    depends_on: [P6B]
    goals:
      - queue responsibility boundary
      - queue state model
      - routing and gate rules canonicalization

  - id: P6C
    name: minimal queue execution engine
    depends_on: [P6C-pre]
    goals:
      - dispatch
      - concurrency control
      - routing
      - json persistence

  - id: P6A
    name: project_registry and queue_policy canonicalization
    depends_on: []
    goals:
      - project_registry.json canonicalization
      - queue_policy.yaml canonicalization

  - id: P6B
    name: run_session integration (loader + DSL + 4 decisions + CLI)
    depends_on: [P6A]
    goals:
      - registry loader integration
      - queue policy loader integration
      - decision DSL evaluator integration
      - project CLI argument

  - id: P6D
    name: minimal scheduler entrypoint
    depends_on: [P6C]
    goals:
      - scheduler_plans.yaml canonicalization
      - CronRunner with --now and --plan-id
      - direct import of QueueEngine
      - JST and ISO weekday

  - id: P6
    name: execution baseline umbrella (queue + scheduler)
    depends_on: [P6A, P6B, P6C-pre, P6C, P6D]
    goals:
      - P6 completion report
      - P7 input conditions frozen

  - id: P7-pre
    name: responsibility canonicalization for Hooks and MCP
    depends_on: [P6]
    goals:
      - hooks and mcp responsibility boundary
      - automation and human judgment boundary
      - phase 7-b deferral for slash commands

  - id: P7
    name: Claude Code Hooks and MCP integration
    depends_on: [P7-pre]
    goals:
      - minimal hooks integration
      - minimal mcp configuration
      - execution guard automation baseline

  - id: P7-B
    name: custom slash commands
    depends_on: [P7]
    goals:
      - session draft command
      - spec review command
      - cursor run command

sessions:
  - session_id: session-125a
    phase_id: phase7
    title: "review_points 正本整合の現物確認と誤判定是正記録"
    status: ready_to_store
    note: |
      2026-04-21: review_points 4軸の第4項目について、古い参照を現物と誤認したため
      「実装過不足なし」を正本とする誤判定が発生した。
      Cursor 実地確認により、現物 docs/global_rules.md と既存テストが
      「検証十分性（テスト・証跡・再現性により、受入判断に足る根拠があること）」
      を正本としていることを確認した。
      本 session はこの現物確認結果と誤判定是正記録を残す。

  - session_id: session-145a
    phase_id: phase8
    title: "dashboard state writer 戦略と bootstrap 方針の正本化"
    status: ready_to_store
    note: |
      docs-only で dashboard `state.json` の責務境界を固定する。
      bootstrap は手動配置、正式 writer 実装は後続 session に分離する。
      session-145b を追加判断なしで起票できる前提を整える。

  - session_id: session-145b
    phase_id: phase8
    title: "dashboard state bootstrap 先行対象の起票"
    status: planned
    note: |
      `state.json` の先行適用は 10 プロジェクト全件ではなく 3〜4 プロジェクトに限定する。
      schema / viewer / runtime 変更を伴わない docs-first の起票準備として扱う。

  - session_id: session-145c
    phase_id: phase8
    title: "dashboard state writer 正式実装"
    status: planned
    note: |
      恒久運用の state writer 実装を扱う後続 session。
      145a/145b で固定した責務分離と対象範囲を前提に実装へ進める。

  - session_id: session-a02-research-01
    phase_id: phase-a02-research
    title: "A02_fina 悩み起点 Research の再設計"
    status: ready_to_store
    supersedes: session-a02-01
  - session_id: session-a02-design-01
    phase_id: phase-a02-design
    title: "A02_fina クラスタ設計 (Research 受領後)"
    status: planned
    depends_on: session-a02-research-01
  - session_id: session-a02-generate-01
    phase_id: phase-a02-generate
    title: "A02_fina 記事生成 (Design 受領後)"
    status: planned
    depends_on: session-a02-design-01
