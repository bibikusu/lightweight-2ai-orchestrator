session_id: session-119

phase_id: phase_observation_v0

title: patch_apply_failure の原因切り分け精度を改善する

objective: >
  patch_apply_failure の report/logs に最小限の診断情報を残し、
  git apply 相当失敗・空差分・パッチ形式不整合の切り分け精度を改善する。

acceptance:
  - id: AC-119-01
    description: git apply stderr がある場合は patch format / context / apply failure を識別した cause_summary が生成される
    test_name: test_patch_apply_failure_diagnostic_classifies_git_apply_stderr
    priority: highest
    completion_criteria_refs:
      - CC-119-01

  - id: AC-119-02
    description: apply 実行後に diff が空の場合は empty_diff 系の cause_summary が生成される
    test_name: test_patch_apply_failure_diagnostic_detects_empty_diff_after_apply
    priority: highest
    completion_criteria_refs:
      - CC-119-01

  - id: AC-119-03
    description: patch_apply_failure の failure_type は維持され、他の canonical failure_type に誤って変化しない
    test_name: test_patch_apply_failure_diagnostic_preserves_failure_type
    priority: high
    completion_criteria_refs:
      - CC-119-03

  - id: AC-119-04
    description: 成功ケースでは patch_apply_failure 用の診断が出力されない
    test_name: test_patch_apply_failure_diagnostic_does_not_pollute_success_case
    priority: medium
    completion_criteria_refs:
      - CC-119-02

completion_criteria:
  - id: CC-119-01
    type: artifact
    condition: patch_apply_failure 時に cause_summary から git apply 相当失敗・空差分・パッチ形式不整合を区別できる

  - id: CC-119-02
    type: non_regression
    condition: 既存の patch apply 成功ケースと他 failure_type 判定を壊さない

  - id: CC-119-03
    type: state_transition_consistent
    condition: patch_apply_failure の failure_type 自体は維持しつつ、診断情報だけが詳細化される

  - id: CC-119-04
    type: side_effect_free
    condition: provider・dashboard 集計・retry 高度化には変更がなく、診断精度改善に限定される

review_points:
  - 仕様一致（AC達成）
  - 変更範囲遵守
  - 副作用なし（既存破壊なし）
  - 検証十分性
