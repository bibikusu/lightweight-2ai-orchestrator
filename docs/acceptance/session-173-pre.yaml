  - id: AC-173-04
    text: selector_complete_design.md で execution_mode が enum (full_stack, fast_path) として定義されている。
    test_name: test_selector_complete_design_defines_execution_mode_enum

  - id: AC-173-05
    text: selector_complete_design.md に metadata.skipped_sessions の構造が定義されている。
