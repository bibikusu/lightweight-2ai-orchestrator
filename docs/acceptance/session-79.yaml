session_id: session-79

acceptance:
  - id: AC-79-01
    description: no_patch_required が not_applicable に正規化される
    test_name: test_no_patch_required_normalized_to_not_applicable

  - id: AC-79-02
    description: 既存の valid patch_status 値の挙動が変わらない
    test_name: test_existing_patch_status_values_remain_unchanged

  - id: AC-79-03
    description: 未知の patch_status 値が flow を壊さない
    test_name: test_unknown_patch_status_is_still_non_blocking

  - id: AC-79-04
    description: changed_files が allowed_changes 内のみ
    test_name: manual_check_changed_files

required_checks:
  - name: ruff
    command: .venv/bin/ruff check .
    expected: pass

  - name: pytest
    command: PYTHONPATH=. .venv/bin/pytest backend/tests/ -q
    expected: pass

  - name: mypy
    command: PYTHONPATH=. .venv/bin/python -m mypy --explicit-package-bases orchestration --ignore-missing-imports
    expected: pass

  - name: compileall
    command: PYTHONPYCACHEPREFIX=./.pycache_compileall python3 -m compileall -q -f orchestration backend
    expected: pass

changed_files_rule:
  allowed_only:
    - orchestration/run_session.py
    - backend/tests/test_patch_status_normalization.py
