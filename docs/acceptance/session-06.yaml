session_id: "session-06"
type: "docs-only"

acceptance:
  - id: "AC-06-01"
    description: "docs/blueprint_spec.md に blueprint の必須出力項目が列挙されている"
    test_name: "docs_review_blueprint_required_fields_defined"

  - id: "AC-06-02"
    description: "必須出力項目ごとに型または制約が明記されている"
    test_name: "docs_review_blueprint_field_constraints_defined"

  - id: "AC-06-03"
    description: "blueprint 生成時の禁止事項が明記され、責務越境が防止されている"
    test_name: "docs_review_blueprint_forbidden_scope_defined"

  - id: "AC-06-04"
    description: "cluster_check へ渡す完成条件が明記されている"
    test_name: "docs_review_blueprint_handoff_condition_defined"

  - id: "AC-06-05"
    description: "変更範囲が docs/blueprint_spec.md と session-06 定義ファイルのみに限定されている"
    test_name: "docs_review_blueprint_scope_and_side_effect_free"

completion_criteria:
  - id: "CC-06-01"
    type: "document_rule"
    condition: "docs/blueprint_spec.md に blueprint の必須出力項目として search_intent, target_keyword, title, description, heading_structure, cta, slug, jsonld_type が明記されていること"

  - id: "CC-06-02"
    type: "document_rule"
    condition: "各必須出力項目について型または制約が明記され、曖昧な自由記述に依存しないこと"

  - id: "CC-06-03"
    type: "document_rule"
    condition: "blueprint 生成時の禁止事項として cluster_check の責務、html_generation の責務、SEO本文生成の混入禁止が明記されていること"

  - id: "CC-06-04"
    type: "state_transition_consistent"
    condition: "cluster_check へ渡せる完成条件が明記され、session-05 で固定した input chain と矛盾していないこと"

  - id: "CC-06-05"
    type: "side_effect_free"
    condition: "docs-only の範囲で完結し、docs/cluster_check_rules.md と docs/html_generation_spec.md を変更していないこと"

review_points:
  - "仕様一致（AC達成）"
  - "変更範囲遵守"
  - "副作用なし（既存破壊なし）"
  - "実装過不足なし"
