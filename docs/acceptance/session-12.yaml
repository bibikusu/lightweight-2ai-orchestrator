manual_acceptance:
  - id: MAC-12-01
    description: タスク画面で日次・週次・月次タスクの表示が業務導線上破綻していない
    type: manual
    manual_check: true
    priority: high
    completion_criteria_refs:
      - CC-12-05
    verification:
      - CardTask をブラウザで開く
      - タスク画面を表示する
      - 日次・週次・月次の表示が切り替え可能であることを確認する
      - OPEN / ACTIVE / CLOSE の表示が崩れていないことを確認する
  - id: MAC-12-02
    description: 業務開始ボタン操作後にタスク表示が当日営業日として自然に表示される
    type: manual
    manual_check: true
    priority: high
    completion_criteria_refs:
      - CC-12-03
      - CC-12-05
    verification:
      - ホーム画面で業務開始ボタンを押す
      - タスク画面へ移動する
      - 当日営業日のタスク状態が表示されることを確認する
      - 表示崩れや操作不能がないことを確認する
  - id: MAC-12-03
    description: 非タスク主要導線に目視回帰がない
    type: manual
    manual_check: true
    priority: medium
    completion_criteria_refs:
      - CC-12-05
    verification:
      - ログイン導線を確認する
      - ホーム画面を確認する
      - シフト画面を確認する
      - 打刻導線を確認する
      - 給与画面を確認する
      - 設定画面を確認する
      - 致命的な表示崩れや操作不能がないことを確認する
notes:
  - stash@{6} は apply しない
  - stash@{6} の主要意図は現行 CardTask 実装に別名対応で反映済みと扱う
  - AC-12-07 以降の旧候補は session-12 の自動ACから外し、必要に応じて後続sessionで扱う
