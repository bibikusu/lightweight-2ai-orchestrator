session_id: "session-165"
goal: "select_next.py --dry-run stdout JSON が session-164 selector_output_contract を既に満たしていることを docs-only で受入検収する。selector/core.py の execution_mode 出力ロジックは session-162 で実装済の事実を併せて正本化する。"
scope:
  - "既存 selector CLI output の受入検収"
  - "selected_session_id / execution_mode 既存出力の正本化"
  - "session-162 で実装済の execution_mode 出力ロジックの正本化"
  - "execution_mode enum 定義 (session-164 contract 整合)"
  - "execution_mode None 値の扱いを session-166 へ handoff"
  - "session-166 への run_session.py 接続 handoff"
out_of_scope:
  - "orchestration/select_next.py の変更"
  - "orchestration/run_session.py の変更"
  - "orchestration/selector/ 配下の変更"
  - "tests/ 配下の変更"
  - "execution_mode による実行分岐"
  - "execution_mode None 値の扱い決定"
  - "fast_path のステージスキップ実装"
  - "session-162 の実装変更"
acceptance:
  - id: "AC-165-01"
    text: "select_next.py --dry-run stdout JSON に selected_session_id と execution_mode が含まれる事実が記録されている。"
    test_name: "test_session_165_observed_selector_keys"
    type: "manual"
    manual_check: true
    verification:
      - "docs/sessions/session-165.json の observed_selector_cli_output.observed_keys に selected_session_id と execution_mode が含まれることを確認する"
  - id: "AC-165-02"
    text: "observed_selector_cli_output.contract_status が key_satisfied_value_pending として定義されている。"
    test_name: "test_session_165_contract_status_recorded"
    type: "manual"
    manual_check: true
    verification:
      - "observed_selector_cli_output.contract_status.value が key_satisfied_value_pending であることを確認する"
  - id: "AC-165-03"
    text: "execution_mode の許可値が full_stack / fast_path の2値に限定されている (session-164 contract 整合)。"
    test_name: "test_session_165_execution_mode_enum"
    type: "manual"
    manual_check: true
    verification:
      - "docs/sessions/session-165.json 内で execution_mode enum が full_stack / fast_path に限定されていることを確認する"
  - id: "AC-165-04"
    text: "run_session.py 側の execution_mode 読取実装が session-166 へ handoff されている。"
    test_name: "test_session_165_handoff_to_session_166"
    type: "manual"
    manual_check: true
    verification:
      - "handoff_to_session_166 に run_session.py の _run_selector_subprocess() 接続が明記されていることを確認する"
  - id: "AC-165-05"
    text: "allowed_changes が docs/sessions/session-165.json と docs/acceptance/session-165.yaml の2件に限定されている。"
    test_name: "test_session_165_allowed_changes_docs_only"
    type: "manual"
    manual_check: true
    verification:
      - "change_guardrails.allowed_changes が docs 2件のみであることを確認する"
      - "forbidden_changes に orchestration/ と tests/ が含まれることを確認する"
  - id: "AC-165-06"
    text: "selector/core.py の _resolve_execution_mode 関数 (session-162 実装) と tests/test_selector.py の execution_mode テスト群 (session-162 起源) が既存することが observed_selector_cli_output.implementation_origin に記録されている。"
    test_name: "test_session_165_implementation_origin_session_162"
    type: "manual"
    manual_check: true
    verification:
      - "observed_selector_cli_output.implementation_origin.session_id が session-162 であることを確認する"
      - "implementation_origin.files に selector/core.py と tests/test_selector.py が含まれることを確認する"
  - id: "AC-165-07"
    text: "execution_mode の値が None の場合の扱いが session-166 への handoff として明記されている。"
    test_name: "test_session_165_none_value_handoff"
    type: "manual"
    manual_check: true
    verification:
      - "handoff_to_session_166.candidate_scope に execution_mode None 値の扱いが含まれることを確認する"
completion_checks:
  - "docs/sessions/session-165.json が存在する"
  - "docs/acceptance/session-165.yaml が存在する"
  - "observed_selector_cli_output.observed_keys に selected_session_id が含まれる"
  - "observed_selector_cli_output.observed_keys に execution_mode が含まれる"
  - "observed_selector_cli_output.contract_status.value が key_satisfied_value_pending である"
  - "observed_selector_cli_output.implementation_origin.session_id が session-162 である"
  - "run_session.py が out_of_scope に含まれている"
  - "handoff_to_session_166.candidate_scope に execution_mode None 値の扱いが含まれる"
  - "実装コードが変更されていない"
change_guardrails:
  allowed_changes:
    - "docs/sessions/session-165.json"
    - "docs/acceptance/session-165.yaml"
  forbidden_changes:
    - "orchestration/select_next.py"
    - "orchestration/run_session.py"
    - "orchestration/selector/"
    - "tests/"
    - ".claude/settings.json"
    - "backend/"
    - "providers/"
    - ".github/"
    - "DL/"
review_points:
  - "仕様一致 (AC達成)"
  - "変更範囲遵守"
  - "副作用なし (既存破壊なし)"
  - "検証十分性"
