  - id: AC-81A-03
    description: 共通モックまたは共通fixtureの再利用により重複定義が減る
    test_name: test_shared_git_mock_fixture_is_reusable

  - id: AC-81A-04
    description: 既存テスト全件が新しいモック基盤導入後も全PASSする
    test_name: test_full_test_suite_passes_after_mock_foundation_change
