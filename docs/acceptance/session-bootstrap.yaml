session_id: "session-bootstrap"
phase_id: "phase-0"
title: "A02_fina patch_apply target path verification"
goal: "patch_apply が A02_fina リポジトリの src/templates/base.html に正しく適用されるかを最小差分で検証する。"

scope:
  - "src/templates/base.html に HTML コメントを1行追加する"
  - "patch_apply の適用先が A02_fina リポジトリであることを検証する"
  - "changed_files に A02_fina 側の対象ファイルが記録されることを確認する"
  - "--skip-checks で live-run が完走することを確認する"

out_of_scope:
  - "オーケストレーター側ファイルの変更"
  - "src/templates/base.html 以外のファイル変更"
  - "HTML テンプレート本体の実装"
  - "CSS 追加"
  - "JSON-LD 追加"
  - "デプロイ処理"
  - "checks の自動化"
  - "run_session.py の改修"

constraints:
  - "1セッション1目的"
  - "変更ファイルは1ファイルのみ"
  - "実装内容は最小とし、HTMLコメント1行追加で十分とする"
  - "既存ファイルへの差分適用形式で実施する"
  - "オーケストレーター側のファイルは変更しない"
  - "--skip-checks 前提で live-run を行う"

acceptance:
  - id: "AC-SB-01"
    description: "patch_apply が A02_fina 側の src/templates/base.html を変更する"
    test_name: "test_patch_apply_modifies_target_repo_base_html"
    verification:
      - "A02_fina リポジトリ側の src/templates/base.html に HTML コメント1行が追加されていることを確認する"
      - "オーケストレーター側の同名ファイルではなく、target_repo 側が変更されていることを確認する"

  - id: "AC-SB-02"
    description: "changed_files に A02_fina 側の src/templates/base.html が記録される"
    test_name: "test_changed_files_records_target_repo_path"
    verification:
      - "report.json または session report の changed_files を確認する"
      - "記録パスが A02_fina 側の src/templates/base.html を指していることを確認する"

  - id: "AC-SB-03"
    description: "--skip-checks で live-run が完走する"
    test_name: "test_live_run_completes_with_skip_checks"
    verification:
      - "run_session.py を --skip-checks 付きで実行する"
      - "checks ステージ失敗で停止せず、最終 report まで出力されることを確認する"

  - id: "AC-SB-04"
    description: "オーケストレーター側ファイルは変更されない"
    test_name: "test_no_control_repo_file_changes"
    verification:
      - "git diff --name-only を確認する"
      - "変更対象が src/templates/base.html のみであることを確認する"
      - "docs/, artifacts/, orchestration/ に変更がないことを確認する"

completion_criteria:
  - id: "CC-SB-01"
    type: "artifact"
    condition: "A02_fina リポジトリの src/templates/base.html にコメント1行が追加されている"

  - id: "CC-SB-02"
    type: "artifact"
    condition: "changed_files に A02_fina 側の src/templates/base.html が記録されている"

  - id: "CC-SB-03"
    type: "non_regression"
    condition: "--skip-checks を付けた live-run が完走している"

  - id: "CC-SB-04"
    type: "side_effect_free"
    condition: "scope 外および control_repo 側に変更が発生していない"

review_points:
  - "仕様一致（AC達成）"
  - "変更範囲遵守"
  - "副作用なし（既存破壊なし）"
  - "実装過不足なし"
