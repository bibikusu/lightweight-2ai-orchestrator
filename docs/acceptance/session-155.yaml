session_id: "session-155"
goal: "既存の docs/config/queue_policy.yaml が session-154 で確定した I/O 契約および責務分離(policy=宣言的データのみ / selector=判断 / queue=実行制御)に適合しているかを検収し、selector が読む正本 policy data として承認する。queue_policy.yaml 自体は変更しない。"
scope:
  - "既存 docs/config/queue_policy.yaml の存在確認と YAML パース成立の検収。"
  - "queue_policy.yaml の必須トップレベルキー存在確認。"
  - "queue_policy.yaml が session-154 io_contract.actors[name=selector].inputs の path と一致することの検収。"
  - "queue_policy.yaml に判断実行ロジック(関数定義 / lambda / eval / 条件分岐 / 計算式 / テンプレート展開)が含まれないことの機械検証。"
  - "queue_policy.yaml が selector / queue / command_center の責務を侵食していないことの検収。"
  - "session-155.json および session-155.yaml の起票による検収結果の正本化。"
out_of_scope:
  - "docs/config/queue_policy.yaml の編集または上書き"
  - "docs/config/queue_policy.yaml の構造変更"
  - "docs/config/project_registry.json の作成または編集"
  - "docs/config/scheduler_plans.yaml の作成または編集"
  - "orchestration/queue/queue_state.json の作成または編集"
  - "artifacts/selector/<timestamp>.json の生成処理の実装"
  - "selector の Python 実装"
  - "queue engine の実装または変更"
  - "Command Center の実装"
  - "dashboard HTML / UI ファイルの作成"
  - "session-154 io_contract の変更"
  - "session-153 queue_policy_schema の変更"
  - "A02_fina プロジェクトへの着手"
  - "orchestration/run_session.py の変更"
  - "providers 配下の変更"
  - "backend 配下の変更"
  - ".github 配下の変更"
  - "docs/roadmap.yaml の変更"
  - "orchestration/config.yaml の変更"
  - "既存 session-01 から session-154 の json / yaml の変更"
  - "既存 acceptance session-01 から session-154 の yaml の変更"
acceptance:
  - id: "AC-155-01"
    requirement: "コマンド `test -f docs/config/queue_policy.yaml && echo OK` の出力に 'OK' が含まれる。"
    test_name: "test_session_155_queue_policy_yaml_exists"
    type: "auto"
    manual_check: false
    verification:
      - "コマンド `test -f docs/config/queue_policy.yaml && echo OK` を実行し出力を確認する。"
  - id: "AC-155-02"
    requirement: "docs/config/queue_policy.yaml が yaml.safe_load でエラーなくパースできる。"
    test_name: "test_session_155_queue_policy_yaml_parses"
    type: "auto"
    manual_check: false
    verification:
      - "コマンド `python3 -c \"import yaml; yaml.safe_load(open('docs/config/queue_policy.yaml'))\"` を実行する。"
      - "exit code が 0 であることを確認する。"
  - id: "AC-155-03"
    requirement: "session-154.json の io_contract.actors[name=selector].inputs[name=queue_policy].path が文字列 'docs/config/queue_policy.yaml' に一致する。"
    test_name: "test_session_155_path_matches_io_contract"
    type: "auto"
    manual_check: false
    verification:
      - "session-154.json をパースし当該 path 値を抽出する。"
      - "値が 'docs/config/queue_policy.yaml' と等しいことを確認する。"
  - id: "AC-155-04"
    requirement: "docs/config/queue_policy.yaml に関数定義 / lambda / eval / exec / => / function( のいずれも含まれない。"
    test_name: "test_session_155_no_function_definition_or_lambda"
    type: "auto"
    manual_check: false
    verification:
      - "コマンド `grep -nE '(\\bdef [a-zA-Z_]+\\(|\\blambda \\b|\\beval\\(|\\bexec\\(|=>|function\\()' docs/config/queue_policy.yaml` を実行する。"
      - "マッチ件数が 0 であることを確認する。"
  - id: "AC-155-05"
    requirement: "docs/config/queue_policy.yaml に if / elif / else: の条件分岐キーワードが含まれない。"
    test_name: "test_session_155_no_conditional_branch"
    type: "auto"
    manual_check: false
    verification:
      - "コマンド `grep -nE '(^[[:space:]]*if [^:]|^[[:space:]]*elif |^[[:space:]]*else:)' docs/config/queue_policy.yaml` を実行する。"
      - "マッチ件数が 0 であることを確認する。"
  - id: "AC-155-06"
    requirement: "docs/config/queue_policy.yaml にテンプレート展開記号 {{ }} ${ } が含まれない。"
    test_name: "test_session_155_no_template_expansion"
    type: "auto"
    manual_check: false
    verification:
      - "コマンド `grep -nE '(\\{\\{|\\}\\}|\\$\\{)' docs/config/queue_policy.yaml` を実行する。"
      - "マッチ件数が 0 であることを確認する。"
  - id: "AC-155-07"
    requirement: "docs/config/queue_policy.yaml の値領域に文字列内式(== / != / >= / <= / && / || を含む文字列値)が存在しない。"
    test_name: "test_session_155_no_string_expression_in_values"
    type: "manual"
    manual_check: true
    verification:
      - "queue_policy.yaml をパースし全値を走査する。"
      - "文字列値内に '==' '!=' '>=' '<=' '&&' '||' のいずれも含まれないことを確認する。"
  - id: "AC-155-08"
    requirement: "queue_policy.yaml に selector の判断ロジック相当(優先度算出関数 / score 計算 / weight 計算)が存在しない。"
    test_name: "test_session_155_no_selector_logic_in_policy"
    type: "manual"
    manual_check: true
    verification:
      - "queue_policy.yaml を全行確認する。"
      - "score / weight / priority_score 等の動的計算式記述が存在しないことを確認する。"
      - "存在する場合はキー名のみで値が静的データ(数値 / 文字列 / list / 単純 map)であることを確認する。"
  - id: "AC-155-09"
    requirement: "queue_policy.yaml に queue の状態遷移ロジック(enqueue / dequeue / state_transition の処理記述)が存在しない。"
    test_name: "test_session_155_no_queue_logic_in_policy"
    type: "manual"
    manual_check: true
    verification:
      - "queue_policy.yaml を全行確認する。"
      - "enqueue / dequeue / state_transition の処理記述が存在しないことを確認する。"
  - id: "AC-155-10"
    requirement: "queue_policy.yaml に Command Center の表示ロジック(dashboard render / html template)が存在しない。"
    test_name: "test_session_155_no_command_center_logic_in_policy"
    type: "manual"
    manual_check: true
    verification:
      - "queue_policy.yaml を全行確認する。"
      - "dashboard render / html template / view 関連の処理記述が存在しないことを確認する。"
  - id: "AC-155-11"
    requirement: "session-155 commit 前後で docs/config/queue_policy.yaml のサイズおよび SHA256 が変化しない。"
    test_name: "test_session_155_queue_policy_yaml_unchanged"
    type: "auto"
    manual_check: false
    verification:
      - "commit 前: `wc -c docs/config/queue_policy.yaml` および `shasum -a 256 docs/config/queue_policy.yaml` を記録する。"
      - "commit 後: 同コマンドを再実行し値が一致することを確認する。"
      - "session-155 開始時のサイズは 3288 bytes である(参考値・session-155.json review_target.size_bytes_at_session_start に記録)。"
  - id: "AC-155-12"
    requirement: "session-155 commit の git show --name-only の結果が docs/sessions/session-155.json と docs/acceptance/session-155.yaml の2件のみである。"
    test_name: "test_session_155_changed_files_within_allowed_scope"
    type: "auto"
    manual_check: false
    verification:
      - "コマンド `git show --name-only <session-155 commit hash>` を実行する。"
      - "出力ファイルが2件のみで session-155.json と session-155.yaml であることを確認する。"
  - id: "AC-155-13"
    requirement: "session-155 commit の git show --name-only に docs/config/queue_policy.yaml が含まれない。"
    test_name: "test_session_155_does_not_modify_queue_policy_yaml"
    type: "auto"
    manual_check: false
    verification:
      - "コマンド `git show --name-only <session-155 commit hash> | grep -c 'docs/config/queue_policy.yaml'` の結果が 0 であることを確認する。"
  - id: "AC-155-14"
    requirement: "session-155 commit の git show --name-only に既存 session-01〜154 および対応 acceptance YAML が含まれない。"
    test_name: "test_session_155_does_not_modify_existing_sessions"
    type: "auto"
    manual_check: false
    verification:
      - "コマンド `git show --name-only <session-155 commit hash>` の結果に docs/sessions/session-{01..154}.json および docs/acceptance/session-{01..154}.yaml が一切含まれていないことを確認する。"
  - id: "AC-155-15"
    requirement: "docs/acceptance/session-155.yaml が新規ファイルとして存在する。"
    test_name: "test_session_155_acceptance_yaml_exists"
    type: "auto"
    manual_check: false
    verification:
      - "コマンド `test -f docs/acceptance/session-155.yaml && echo OK` を実行し OK が出力されることを確認する。"
  - id: "AC-155-16"
    requirement: "session-155.json が allowed_changes_detail (list[str]) / forbidden_changes / completion_criteria (object 配列) / acceptance_criteria / review_points のすべてを構造化キーとして含む。"
    test_name: "test_session_155_json_contains_all_required_structural_keys"
    type: "auto"
    manual_check: false
    verification:
      - "session-155.json をパースしトップレベルキーを確認する。"
      - "allowed_changes_detail / forbidden_changes / completion_criteria / acceptance_criteria / review_points がすべて存在することを確認する。"
      - "allowed_changes_detail が list[str] 型であることを確認する。"
      - "completion_criteria が object 配列で各要素が id / type / condition を持つことを確認する。"
completion_checks:
  - "docs/config/queue_policy.yaml が存在し YAML として正常にパースされる。"
  - "queue_policy.yaml のパスが session-154 io_contract と完全一致する。"
  - "queue_policy.yaml に判断実行ロジック(関数 / lambda / eval / 条件分岐 / テンプレート式)が含まれない。"
  - "queue_policy.yaml に selector / queue / command_center の責務侵食記述が含まれない。"
  - "queue_policy.yaml が session-155 commit 前後でサイズ・SHA256 ともに不変である。"
  - "session-155 commit の変更ファイルが session-155.json と session-155.yaml の2件のみである。"
  - "既存 session-01〜154 が変更されていない。"
  - "docs/acceptance/session-155.yaml が新規作成保存されている。"
  - "session-155.json が必須構造化キーをすべて含む。"
change_guardrails:
  allowed_changes:
    - "docs/sessions/session-155.json"
    - "docs/acceptance/session-155.yaml"
  forbidden_changes:
    - "docs/config/queue_policy.yaml の編集または上書きまたは構造変更"
    - "docs/config/project_registry.json の作成または編集"
    - "docs/config/scheduler_plans.yaml の作成または編集"
    - "orchestration/queue/queue_state.json の作成または編集"
    - "artifacts/selector/ 配下のファイル生成"
    - "selector の Python 実装の追加"
    - "queue engine 実装の変更"
    - "Command Center 実装の追加"
    - "dashboard HTML / UI ファイルの作成"
    - "session-154 io_contract の変更"
    - "session-153 queue_policy_schema の変更"
    - "orchestration/run_session.py の変更"
    - "providers 配下の変更"
    - "backend 配下の変更"
    - ".github 配下の変更"
    - "docs/roadmap.yaml の変更"
    - "orchestration/config.yaml の変更"
    - "既存 session-01 から session-154 の json / yaml の変更"
    - "A02_fina プロジェクトへの着手"
review_points:
  - "仕様一致(AC達成)"
  - "変更範囲遵守"
  - "副作用なし(既存破壊なし)"
  - "検証十分性"
