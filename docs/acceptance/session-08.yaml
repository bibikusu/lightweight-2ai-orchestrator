session_id: "session-08"
type: "docs-only"

acceptance:
  - id: "AC-08-01"
    description: "docs/cluster_check_rules.md に cluster_check の入力前提が明記されている"
    test_name: "docs_review_cluster_input_preconditions_defined"

  - id: "AC-08-02"
    description: "判定観点が列挙されており、重複と衝突の基準が明記されている"
    test_name: "docs_review_cluster_judgement_rules_defined"

  - id: "AC-08-03"
    description: "判定結果の3区分と各区分の後続アクションが明記されている"
    test_name: "docs_review_cluster_result_actions_defined"

  - id: "AC-08-04"
    description: "html_generation へ渡せる条件が明記されている"
    test_name: "docs_review_cluster_handoff_condition_defined"

  - id: "AC-08-05"
    description: "変更範囲が docs/cluster_check_rules.md と session-08 定義ファイルのみに限定されている"
    test_name: "docs_review_cluster_scope_and_side_effect_free"

completion_criteria:
  - id: "CC-08-01"
    type: "document_rule"
    condition: "docs/cluster_check_rules.md に cluster_check の入力前提として blueprint の必須受領項目と判定開始条件が明記されていること"

  - id: "CC-08-02"
    type: "document_rule"
    condition: "判定観点として少なくとも重複、検索意図衝突、slug衝突、見出し構造の競合、CTA目的衝突が明記されていること"

  - id: "CC-08-03"
    type: "document_rule"
    condition: "判定結果が採用可 / 修正要 / 作成中止 の3区分で明記され、それぞれの意味と後続アクションが定義されていること"

  - id: "CC-08-04"
    type: "state_transition_consistent"
    condition: "html_generation に渡せる条件が採用可の blueprint のみであることが明記され、session-05 で固定した input chain と矛盾していないこと"

  - id: "CC-08-05"
    type: "side_effect_free"
    condition: "docs-only の範囲で完結し、docs/blueprint_spec.md と docs/html_generation_spec.md を変更していないこと"

review_points:
  - "仕様一致（AC達成）"
  - "変更範囲遵守"
  - "副作用なし（既存破壊なし）"
  - "実装過不足なし"
