session_id: "session-21"
phase_id: "phase6"
title: "project_registry による project 解決一元化"

acceptance:
  - id: "AC-21-01"
    description: "registry 未登録 project_id は fail-fast で停止する"
    test_name: "test_registry_rejects_unknown_project_id"
  - id: "AC-21-02"
    description: "project_id から target_repo を一貫して解決できる"
    test_name: "test_registry_resolves_target_repo_from_project_id"
  - id: "AC-21-03"
    description: "project_id から実在する project_root を解決できる"
    test_name: "test_registry_resolves_existing_project_root_from_project_id"
  - id: "AC-21-04"
    description: "project_id から実在する docs_root を解決できる"
    test_name: "test_registry_resolves_existing_docs_root_from_project_id"
  - id: "AC-21-05"
    description: "artifacts 出力先が artifact_namespace 配下に分離される"
    test_name: "test_registry_namespaces_artifacts_by_project_id"
  - id: "AC-21-06"
    description: "legacy session は明示マッピングがある場合のみ project 解決できる"
    test_name: "test_legacy_session_requires_explicit_project_mapping"

review_points:
  - "仕様一致（AC達成）"
  - "変更範囲遵守"
  - "副作用なし（既存破壊なし）"
  - "検証十分性"
