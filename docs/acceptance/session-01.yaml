session_id: "session-01"
acceptance:
  - id: "AC-01-01"
    description: "finance_legal_affiliate の vertical policy JSON を読み込んで article blueprint を生成できる。"
    test_name: "test_generate_blueprint_with_vertical_policy_json"

  - id: "AC-01-02"
    description: "出力に proposed_title, meta_description, slug, H2/H3構成, CTA配置方針が含まれる。"
    test_name: "test_output_contains_blueprint_meta_outline_and_cta"

  - id: "AC-01-03"
    description: "記事本文は出力されず、構成・メタ・公開候補のみが返る。"
    test_name: "test_body_content_is_not_generated"

  - id: "AC-01-04"
    description: "risk_notes が finance_legal_affiliate の YMYL注意を反映して出力される。"
    test_name: "test_risk_notes_reflect_vertical_policy"

  - id: "AC-01-05"
    description: "必須入力が不足している場合でもクラッシュせず、安全に入力不足として扱える。"
    test_name: "test_missing_required_input_is_handled_safely"

  - id: "AC-01-06"
    description: "業種固有ルールが index.html にハードコードされず、vertical policy JSON から参照される構造になっている。"
    test_name: "test_vertical_specific_rules_are_externalized_to_json"

  - id: "AC-01-07"
    description: "phase_a_mvp/index.html, phase_a_mvp/config/vertical.finance_legal_affiliate.json, phase_a_mvp/api_proxy.php が存在する。"
    test_name: "test_phase_a_mvp_required_files_exist"

  - id: "AC-01-08"
    description: "docs/sessions/session-01.json と docs/acceptance/session-01.yaml が repository 相対パスで保存対象として定義されている。"
    test_name: "test_session_01_spec_and_acceptance_paths_are_defined"
