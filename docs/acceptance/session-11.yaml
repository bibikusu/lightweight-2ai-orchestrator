session_id: "session-11"
type: "docs-only"
target_repo: "A02_fina"

acceptance:
  - id: "AC-11-01"
    description: "phase_a_execution_contract.md に Phase A の実行順・handoff 条件・出力物が明記されている"
    test_name: "docs_review_phase_a_execution_contract_exists_and_complete"

  - id: "AC-11-02"
    description: "phase_a_sample_input.md に blueprint 作成のための最小サンプル入力が明記されている"
    test_name: "docs_review_phase_a_sample_input_exists_and_complete"

  - id: "AC-11-03"
    description: "execution contract の記述が blueprint -> cluster_check -> html_generation の chain と矛盾していない"
    test_name: "docs_review_phase_a_execution_contract_chain_consistent"

  - id: "AC-11-04"
    description: "既存3文書への修正がある場合も参照導線など最小修正に留まり、新しい仕様を追加していない"
    test_name: "docs_review_phase_a_execution_contract_minimal_change"

  - id: "AC-11-05"
    description: "変更範囲が allowed_changes のみに限定されている"
    test_name: "docs_review_phase_a_execution_contract_scope_and_side_effect_free"

completion_criteria:
  - id: "CC-11-01"
    type: "artifact"
    condition: "docs/phase_a_execution_contract.md が新規追加され、Phase A の実行順・handoff 条件・出力物が読めること"

  - id: "CC-11-02"
    type: "artifact"
    condition: "docs/phase_a_sample_input.md が新規追加され、blueprint 生成に必要な最小入力セットが読めること"

  - id: "CC-11-03"
    type: "document_rule"
    condition: "execution contract が blueprint -> cluster_check -> html_generation の順で session-10 の chain と矛盾しないこと"

  - id: "CC-11-04"
    type: "side_effect_free"
    condition: "既存3文書への修正がある場合も参照導線追加など最小修正に留まり、新しい仕様項目を増やしていないこと"

  - id: "CC-11-05"
    type: "non_regression"
    condition: "変更範囲が allowed_changes 内に収まり、report.json に changed_files が空でなく記録されること"
review_points:
  - "仕様一致（AC達成）"
  - "変更範囲遵守"
  - "副作用なし（既存破壊なし）"
  - "検証十分性"
