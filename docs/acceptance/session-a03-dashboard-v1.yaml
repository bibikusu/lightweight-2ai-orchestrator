session_id: session-a03-dashboard-v1
acceptance:
  - id: AC-A03V1-01
    description: expected_project_ids が registry 正本IDと完全一致
    test_name: test_session_def_ids_match_registry_canonical
    type: document_rule
    manual_check: false
    priority: highest
    completion_criteria_refs:
      - CC-A03V1-03
    implementation_refs:
      - docs/sessions/session-a03-dashboard-v1.json
      - docs/acceptance/session-a03-dashboard-v1.yaml
      - docs/config/project_registry.json
    verification_command: >
      python3 -c "
      import json, yaml
      CANONICAL = [
        'A01_Card_task','A02_fina','A03_mane_bikusu','A04_deli_customer_management',
        'A05_CAST_PRO','A06_cecare','A07_pochadeli_work',
        'A08_AI_video_creation','A09_AI_movie_production','A10_fina_date'
      ]
      reg = json.load(open('docs/config/project_registry.json'))
      reg_ids = sorted([p['id'] for p in (reg if isinstance(reg, list) else reg.get('projects', []))])
      print('registry IDs:', reg_ids)
      print('canonical   :', sorted(CANONICAL))
      print('MATCH' if reg_ids == sorted(CANONICAL) else 'MISMATCH')
      "

  - id: AC-A03V1-02
    description: AC yaml の IDリストが registry 正本IDと完全一致
    test_name: test_acceptance_yaml_ids_match_registry
    type: document_rule
    manual_check: false
    priority: highest
    completion_criteria_refs:
      - CC-A03V1-03
    implementation_refs:
      - docs/sessions/session-a03-dashboard-v1.json
      - docs/acceptance/session-a03-dashboard-v1.yaml
      - docs/config/project_registry.json
    expected_project_ids:
      - A01_Card_task
      - A02_fina
      - A03_mane_bikusu
      - A04_deli_customer_management
      - A05_CAST_PRO
      - A06_cecare
      - A07_pochadeli_work
      - A08_AI_video_creation
      - A09_AI_movie_production
      - A10_fina_date
    verification_command: >
      python3 -c "
      import json, yaml
      CANONICAL = sorted([
        'A01_Card_task','A02_fina','A03_mane_bikusu','A04_deli_customer_management',
        'A05_CAST_PRO','A06_cecare','A07_pochadeli_work',
        'A08_AI_video_creation','A09_AI_movie_production','A10_fina_date'
      ])
      doc = yaml.safe_load(open('docs/acceptance/session-a03-dashboard-v1.yaml'))
      ac02 = next(a for a in doc['acceptance'] if a['id'] == 'AC-A03V1-02')
      yaml_ids = sorted(ac02['expected_project_ids'])
      print('yaml IDs     :', yaml_ids)
      print('canonical    :', CANONICAL)
      print('MATCH' if yaml_ids == CANONICAL else 'MISMATCH')
      "

  - id: AC-A03V1-03
    description: allowed_changes_detail が list[str] で実ファイルパスのみ
    test_name: test_allowed_changes_detail_is_pure_pathlist
    type: artifact
    manual_check: false
    priority: high
    completion_criteria_refs:
      - CC-A03V1-01
    implementation_refs:
      - docs/sessions/session-a03-dashboard-v1.json
      - docs/acceptance/session-a03-dashboard-v1.yaml
      - docs/config/project_registry.json
    verification_command: >
      python3 -c "
      import json
      d = json.load(open('docs/sessions/session-a03-dashboard-v1.json'))
      detail = d['allowed_changes_detail']
      assert isinstance(detail, list), 'NG: not a list'
      for v in detail:
          assert isinstance(v, str), f'NG: non-str value: {v}'
          assert ':' not in v, f'NG: contains colon (not pure path): {v}'
      print('OK: allowed_changes_detail is list[str] of pure paths')
      print('entries:', detail)
      "

  - id: AC-A03V1-04
    description: forbidden_changes に必須項目が全て含まれる
    test_name: test_forbidden_changes_contains_required_items
    type: artifact
    manual_check: false
    priority: high
    completion_criteria_refs:
      - CC-A03V1-01
    implementation_refs:
      - docs/sessions/session-a03-dashboard-v1.json
      - docs/acceptance/session-a03-dashboard-v1.yaml
      - docs/config/project_registry.json
    required_items:
      - run_session.py
      - docs/config/project_registry.json
      - docs/config/queue_policy.yaml
      - data/projects.json
      - package.json
    verification_command: >
      python3 -c "
      import json
      d = json.load(open('docs/sessions/session-a03-dashboard-v1.json'))
      forbidden = d['forbidden_changes']
      required = [
        'run_session.py',
        'docs/config/project_registry.json',
        'docs/config/queue_policy.yaml',
        'data/projects.json',
        'package.json',
      ]
      for item in required:
          status = 'OK' if item in forbidden else 'NG'
          print(f'{status}: {item}')
      "

  - id: AC-A03V1-05
    description: "review_points[3] = '検証十分性' が固定値"
    test_name: test_review_points_axis4_is_fixed
    type: artifact
    manual_check: false
    priority: high
    completion_criteria_refs:
      - CC-A03V1-02
    implementation_refs:
      - docs/sessions/session-a03-dashboard-v1.json
      - docs/acceptance/session-a03-dashboard-v1.yaml
      - docs/config/project_registry.json
    verification_command: >
      python3 -c "
      import json
      d = json.load(open('docs/sessions/session-a03-dashboard-v1.json'))
      rp = d['review_points']
      assert len(rp) >= 4, f'NG: review_points has only {len(rp)} items'
      expected = '検証十分性'
      actual = rp[3]
      print('OK' if actual == expected else 'NG', f'review_points[3] = {actual!r}')
      "

notes:
  - "docs-only session として GPT 判定のみで受入"
  - "実装フェーズは session-a03-dashboard-v1-impl で扱う"
  - "本 session の受入後、registry 正本IDベースの projects.json 更新 session および実装 session を別途起票"
