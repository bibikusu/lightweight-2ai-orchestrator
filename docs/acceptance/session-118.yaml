    test_name: test_resolve_canonical_failure_type_prefers_regression_for_init_preflight_duplicate
    completion_criteria_refs:
      - CC-118-03

  - id: AC-118-04
    description: "実際の pytest / import 失敗は test_failure / import_error のまま維持する"
