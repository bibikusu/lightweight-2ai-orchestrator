session_id: session-69

acceptance:
  - id: AC-69-01
    description: _normalize_hunk_line_prefixes が main 上の _apply_patch_smart 内で呼び出されている
    test_name: test_hunk_line_prefix_normalization_adds_missing_plus

  - id: AC-69-02
    description: hunk 内で +/-/space/\ で始まらない行に + が補完される
    test_name: test_hunk_line_prefix_normalization_preserves_valid_lines

  - id: AC-69-03
    description: session-68 の normalize_patch_for_git_apply と session-66 の分類挙動を壊さない
    test_name: test_existing_patch_and_classification_behavior_unchanged_after_hunk_fix

  - id: AC-69-04
    description: changed_files が allowed_changes 内のみ
    test_name: manual_check_changed_files_within_scope

required_checks:
  - name: ruff
    command: .venv/bin/ruff check .
    expected: pass

  - name: pytest
    command: PYTHONPATH=. .venv/bin/pytest backend/tests/ -q
    expected: pass

  - name: mypy
    command: PYTHONPATH=. .venv/bin/python -m mypy --explicit-package-bases orchestration --ignore-missing-imports
    expected: pass

  - name: compileall
    command: PYTHONPYCACHEPREFIX=./.pycache_compileall python3 -m compileall -q -f orchestration backend
    expected: pass

changed_files_rule:
  allowed_only:
    - orchestration/run_session.py
    - backend/tests/test_patch_validation.py

non_functional_requirements:
  - session-68 normalize_patch_for_git_apply must remain functional
  - session-66 SyntaxError family classification must remain unchanged
  - no provider file changes
  - no .gitignore changes
  - no docs changes

completion_judgement:
  pass_conditions:
    - all acceptance items pass
    - all required_checks pass
    - changed files are limited to allowed_only
    - no out_of_scope change is detected

  fail_conditions:
    - any acceptance item fails
    - any required_check fails
    - any changed file is outside allowed_only
    - any unrelated behavior is broken
