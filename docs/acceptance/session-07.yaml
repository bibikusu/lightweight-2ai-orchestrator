session_id: "session-07"
goal: "session-06 と同一のパイプライン v0 型で session-07 定義と acceptance YAML を生成・検証・保存し、テンプレートの再現性を確認する。"
scope:
  - "docs/session-07_input_set.md を入力として使用する。"
  - "docs/templates/session_json_generate.md を使用して docs/sessions/session-07.json の内容を生成する。"
  - "生成した session JSON をもとに docs/templates/acceptance_yaml_generate.md を使用して docs/acceptance/session-07.yaml の内容を生成する。"
  - "生成した JSON と YAML を docs/templates/generation_selfcheck.md により整合性・互換性チェックする。"
  - "pass した生成物を docs/sessions/session-07.json と docs/acceptance/session-07.yaml に保存する。"
  - "session-06 と session-07 の構造差分を確認し、テンプレート再現性を評価する。"
out_of_scope:
  - "orchestration/run_session.py の変更"
  - "providers 配下の変更"
  - "backend 配下の変更"
  - ".github 配下の変更"
  - "docs/templates 配下の新規作成・更新・削除"
  - "roadmap.yaml の追加変更"
  - "session-08 以降の生成"
  - "Bootstrap 実装コードの追加"
  - "テンプレートA/B/Cの改訂"
  - "Spec Check v0 のコード実装"
acceptance:
  - id: "AC-01"
    requirement: "session-07.json に現行オーケストレーター required keys（session_id, phase_id, title, goal, scope, out_of_scope, constraints, acceptance_ref）がすべて存在する。"
    test_name: "test_session_07_required_keys_present"
    type: "automated"
    manual_check: false
    verification:
      - "session-07.json をパースし、8つの必須キーがすべて存在することを確認する。"
  - id: "AC-02"
    requirement: "session-07.json の phase_id が phase-07 であり、roadmap.yaml と整合する。"
    test_name: "test_session_07_phase_id_matches_roadmap"
    type: "automated"
    manual_check: false
    verification:
      - "session-07.json の phase_id が phase-07 であることを確認する。"
      - "docs/roadmap.yaml に phase-07 が定義されていることを確認する。"
  - id: "AC-03"
    requirement: "session-07.json の acceptance_ref が docs/acceptance/session-07.yaml と一致する。"
    test_name: "test_session_07_acceptance_ref_matches_path"
    type: "automated"
    manual_check: false
    verification:
      - "session-07.json の acceptance_ref の値が docs/acceptance/session-07.yaml であることを確認する。"
  - id: "AC-04"
    requirement: "session-07.yaml のトップレベルに session_id があり、session-07 と一致する。"
    test_name: "test_session_07_yaml_top_level_session_id"
    type: "automated"
    manual_check: false
    verification:
      - "session-07.yaml をパースし、トップレベルの session_id が session-07 であることを確認する。"
  - id: "AC-05"
    requirement: "session-07.yaml が acceptance, completion_checks, change_guardrails を含む。"
    test_name: "test_session_07_yaml_required_template_sections"
    type: "automated"
    manual_check: false
    verification:
      - "session-07.yaml のトップレベルに acceptance キーが存在することを確認する。"
      - "session-07.yaml のトップレベルに completion_checks キーが存在することを確認する。"
      - "session-07.yaml のトップレベルに change_guardrails キーが存在することを確認する。"
  - id: "AC-06"
    requirement: "allowed_changes に docs/templates 配下や実装コードが含まれていない。"
    test_name: "test_session_07_allowed_changes_restricted"
    type: "automated"
    manual_check: false
    verification:
      - "session-07.json の allowed_changes に docs/templates を含むパスがないことを確認する。"
      - "session-07.json の allowed_changes に orchestration/ や backend/ を含むパスがないことを確認する。"
  - id: "AC-07"
    requirement: "forbidden_changes が run_session.py、providers、backend、.github、docs/templates を禁止している。"
    test_name: "test_session_07_forbidden_changes_defined"
    type: "automated"
    manual_check: false
    verification:
      - "session-07.json の forbidden_changes に run_session.py 関連の記述があることを確認する。"
      - "session-07.json の forbidden_changes に providers、backend、.github、docs/templates 関連の記述があることを確認する。"
  - id: "AC-08"
    requirement: "generation_selfcheck の結果が pass である。"
    test_name: "test_session_07_generation_selfcheck_passes"
    type: "manual"
    manual_check: true
    verification:
      - "テンプレートCに session-07.json と session-07.yaml を投入し、出力の status が pass であることを確認する。"
  - id: "AC-09"
    requirement: "session-06.json と session-07.json のトップレベルキー構成が一致する。"
    test_name: "test_session_07_schema_matches_session_06"
    type: "automated"
    manual_check: false
    verification:
      - "session-06.json と session-07.json のトップレベルキー一覧を取得し、同一であることを確認する。"
completion_checks:
  - "docs/sessions/session-07.json が保存されている。"
  - "docs/acceptance/session-07.yaml が保存されている。"
  - "session-07.json に session_id, phase_id, title, goal, scope, out_of_scope, constraints, acceptance_ref が存在する。"
  - "session-07.json の acceptance_ref が docs/acceptance/session-07.yaml と一致する。"
  - "session-07.yaml のトップレベルに session_id が存在する。"
  - "生成物が generation_selfcheck により pass 判定となる。"
  - "変更ファイルが docs/sessions/session-07.json と docs/acceptance/session-07.yaml の2件に限定される。"
  - "session-06.json と session-07.json の構造が同一スキーマに従っている。"
change_guardrails:
  allowed_changes:
    - "docs/sessions/session-07.json"
    - "docs/acceptance/session-07.yaml"
  forbidden_changes:
    - "orchestration/run_session.py を変更しない。"
    - "providers 配下を変更しない。"
    - "backend 配下を変更しない。"
    - ".github 配下を変更しない。"
    - "docs/templates 配下を変更しない。"
    - "docs/roadmap.yaml を変更しない。"
    - "docs/sessions/session-08.json 以降を作成しない。"
    - "docs/acceptance/session-08.yaml 以降を作成しない。"
