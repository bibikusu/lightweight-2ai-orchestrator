session_id: "session-163"
goal: "run_session.py の parse_args() に --use-selector flag を追加し、指定時に subprocess.run で select_next.py --dry-run を呼び出して stdout JSON から selected_session_id を取得し、既存の --session-id 実行パスへ渡す。"
scope:
  - "orchestration/run_session.py の parse_args() に --use-selector flag を追加する"
  - "--use-selector 指定時に subprocess.run で selector CLI を呼び出す (案 α-1)"
  - "stdout を json.loads() して selected_session_id を取得し既存実行パスへ渡す"
  - "--use-selector / --session-id / --batch を mutually_exclusive_group で排他化する (案 X-1)"
  - "selector の exit code が非ゼロなら stderr 表示 + exit 1 で停止する (案 E-1)"
  - "tests/test_run_session_selector.py を新規作成し AC-163-01〜06 に対応する"
out_of_scope:
  - "orchestration/selector/ 配下のロジック変更"
  - "orchestration/select_next.py の変更"
  - "from orchestration.selector import ... による内部 import"
  - "human approval ゲート機構の追加"
  - "execution_mode (full_stack / fast_path) 分岐実装"
  - "queue / scheduler 接続"
  - "自動実行本体 (--dry-run なし実行) の挙動変更"
  - "docs/sessions/session-163-pre.json の変更 (確定済)"
  - "docs/acceptance/session-163-pre.yaml の変更 (確定済)"
  - "--use-selector と --dry-run の同時挙動"
acceptance:
  - id: "AC-163-01"
    text: "orchestration/run_session.py の parse_args() に --use-selector flag が argparse で追加されている。"
    test_name: "test_parse_args_has_use_selector_flag"
    type: "automated"
    manual_check: false
    verification:
      - "parse_args() を呼び出し、args.use_selector 属性が存在することを確認する"
  - id: "AC-163-02"
    text: "--use-selector 指定時に subprocess で select_next.py --dry-run が呼ばれ、stdout JSON から selected_session_id が取得される。"
    test_name: "test_use_selector_calls_subprocess_and_extracts_session_id"
    type: "automated"
    manual_check: false
    verification:
      - "subprocess.run を mock し、stdout に有効な selector JSON を返すように設定する"
      - "selected_session_id が正しく取得されることを確認する"
  - id: "AC-163-03"
    text: "取得した selected_session_id が既存の _run_single_session_impl() の session_id として使用される。"
    test_name: "test_use_selector_session_id_passed_to_impl"
    type: "automated"
    manual_check: false
    verification:
      - "_run_single_session_impl を mock し、args.session_id に selected_session_id が設定されることを確認する"
  - id: "AC-163-04"
    text: "orchestration/run_session.py に 'from orchestration.selector' または 'import orchestration.selector' が含まれない。"
    test_name: "test_no_direct_selector_import"
    type: "automated"
    manual_check: false
    verification:
      - "run_session.py のソースを読み、selector 直接 import がないことを grep で確認する"
  - id: "AC-163-05"
    text: "session-163 実装の sandbox commit 後の HEAD 上で、既存テスト tests/test_selector.py / tests/test_select_next_cli.py が全件 PASS (regression なし)。"
    test_name: "test_existing_tests_pass_no_regression"
    type: "automated"
    manual_check: false
    verification:
      - "session-163 実装 commit 後の HEAD で PYTHONPATH=. pytest tests/test_selector.py tests/test_select_next_cli.py -q が exit 0 で終了することを確認する"
  - id: "AC-163-06"
    text: "--use-selector / --session-id / --batch が mutually exclusive であり、2つ以上指定すると argparse エラーになる。"
    test_name: "test_use_selector_mutually_exclusive_with_session_id_and_batch"
    type: "automated"
    manual_check: false
    verification:
      - "--use-selector --session-id session-01 を指定すると SystemExit が発生することを確認する"
      - "--use-selector --batch session-01,session-02 を指定すると SystemExit が発生することを確認する"
completion_checks:
  - "orchestration/run_session.py に --use-selector flag が追加されている"
  - "tests/test_run_session_selector.py が新規作成されている"
  - "docs/sessions/session-163.json が保存されている"
  - "docs/acceptance/session-163.yaml が保存されている"
  - "orchestration/selector/ 配下が変更されていない"
  - "既存 main() の if 文ロジックが変更されていない"
  - "acceptance_criteria のキーが text である"
  - "変更ファイルが 4 件以内"
change_guardrails:
  allowed_changes:
    - "orchestration/run_session.py"
    - "tests/test_run_session_selector.py"
    - "docs/sessions/session-163.json"
    - "docs/acceptance/session-163.yaml"
  forbidden_changes:
    - "orchestration/select_next.py"
    - "orchestration/selector/"
    - "docs/sessions/session-163-pre.json"
    - "docs/acceptance/session-163-pre.yaml"
    - ".claude/settings.json"
    - "tests/test_selector.py"
    - "tests/test_select_next_cli.py"
    - "backend/"
    - "providers/"
    - ".github/"
    - "DL/"
review_points:
  - "仕様一致 (AC達成)"
  - "変更範囲遵守"
  - "副作用なし (既存破壊なし、selector 直接 import なし)"
  - "検証十分性"
