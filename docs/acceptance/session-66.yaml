session_id: session-66

acceptance:
  - id: AC-66-01
    description: IndentationError を generated_artifact_invalid として分類できる
    test_name: test_indentation_error_is_classified_as_generated_artifact_invalid

  - id: AC-66-02
    description: SyntaxError 系が test_failure に誤分類されない
    test_name: test_syntax_error_family_is_not_misclassified_as_test_failure

  - id: AC-66-03
    description: report.json に failure_type と failure metadata が同時に残る
    test_name: test_report_payload_keeps_failure_type_and_failure_metadata_for_generated_artifact_invalid

  - id: AC-66-04
    description: 既存の failure classification 挙動を壊さない
    test_name: test_existing_failure_classification_behavior_remains_unchanged

required_checks:
  - name: ruff
    command: .venv/bin/ruff check .
    expected: pass

  - name: pytest
    command: PYTHONPATH=. .venv/bin/pytest backend/tests/ -q
    expected: pass

  - name: mypy
    command: PYTHONPATH=. .venv/bin/python -m mypy --explicit-package-bases orchestration --ignore-missing-imports
    expected: pass

  - name: compileall
    command: python3 -m compileall -q -f orchestration backend
    expected: pass

changed_files_rule:
  allowed_only:
    - orchestration/run_session.py
    - backend/tests/test_run_session_failure_classification.py

non_functional_requirements:
  - report.json existing required keys must remain present
  - failure_type top-level field must remain present
  - failure metadata fields must remain serializable
  - no provider file changes
  - no docs changes in this session

completion_judgement:
  pass_conditions:
    - all acceptance items pass
    - all required_checks pass
    - changed files are limited to allowed_only
    - no out_of_scope change is detected

  fail_conditions:
    - any acceptance item fails
    - any required_check fails
    - any changed file is outside allowed_only
    - any unrelated classification behavior is broken
