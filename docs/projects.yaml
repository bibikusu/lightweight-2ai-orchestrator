# Projects Registry v1
#
# 10 プロジェクトの初期登録の正本。
# session-144 (viewer v0) がこの yaml を読んで 10 プロジェクト一覧を描画する。
#
# path はリポジトリ相対パスで記述する。絶対パスは使用しない。
# 各プロジェクトの実在ステータスは status_source で指定された相対パスの state.json を参照する。
# state.json が未整備のプロジェクトは viewer 側で status=idle / summary="データ未整備" 表示とする。

version: 1
registry_updated: "2026-04-20"

projects:
