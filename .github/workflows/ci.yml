name: ci

"on":
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest mypy

      - name: Pytest
        run: |
          PYTHONPATH=. pytest backend/tests/ -q

      - name: Typecheck
        run: |
          python -m mypy --explicit-package-bases orchestration --ignore-missing-imports --disable-error-code import-untyped

      - name: Build
        run: |
          PYTHONPYCACHEPREFIX="./.pycache_compileall" python -m compileall -q -f orchestration backend
