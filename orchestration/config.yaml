# 実行時設定（プロバイダ・コマンド・上限）
providers:
  openai:
    model: gpt-4o
    timeout_sec: 120
    max_output_tokens: 4000
  claude:
    model: claude-sonnet-4-20250514
    timeout_sec: 180
    max_output_tokens: 6000

# commands: run_session の cwd はリポジトリルート。空文字は skipped（未導入のため意図的に空）。
commands:
  # test: 未導入のため意図的に空（pytest 等のテストスイート・tests/ なし）
  test: ""
  # lint: 標準ライブラリのみ。PYTHONPYCACHEPREFIX で .pyc をリポジトリ配下に寄せ、権限の厳しい環境でも失敗しにくくする
  lint: 'PYTHONPYCACHEPREFIX="./.pycache_py_compile" python3 -m py_compile orchestration/run_session.py'
  # typecheck: 未導入のため意図的に空（mypy / pyright 等なし）
  typecheck: ""
  # build: 未導入のため意図的に空（Node/Java 等のビルドパイプラインなし）
  build: ""

runtime:
  stop_on_first_check_failure: true

limits:
  max_retries: 3
  # 1セッションあたりの変更ファイル上限（patch 適用前チェック）
  max_changed_files: 5
